---
name: Notify on CI Failure

on:  # yamllint disable-line rule:truthy
  workflow_run:
    workflows:
      - "Checkov Scan"
      - "Deploy Documentation"
      - "OSV-Scanner PR Scan"
      - "Release"
      - "Terraform CI"
      - "Terraform CD"
      - "Terraform-CI"
      - "Terraform-CD"
      - "Terraform Module Review"
    types:
      - completed

jobs:
  notify:
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Find the PR associated with this workflow run
            const run = context.payload.workflow_run;
            const prs = run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log("No PR associated with this workflow run");
              return;
            }
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  `**CI Failure:** Workflow **${run.name}** failed.`,
                  `[View run](${run.html_url})`,
                  ``,
                  `cc @akuzminsky`,
                ].join("\n"),
              });
            }
